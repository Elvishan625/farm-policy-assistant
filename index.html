<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高标准农田AI政策助手</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <header class="page-header">
    <div class="header-content">
      <span class="header-icon" aria-hidden="true">🌾</span>
      <h1 class="header-title">高标准农田AI政策助手</h1>
    </div>
    <p class="header-subtitle">基于最新政策文件，为您提供专业、准确的农田建设政策咨询</p>
  </header>

  <main class="main-content">
    <div class="hero-section">
      <div class="hero-icon">🌱</div>
      <h2>欢迎使用政策助手</h2>
      <p>点击右下角悬浮球，开始您的政策咨询之旅</p>
      <ul class="feature-list">
        <li>🔍 高标准农田政策智能问答</li>
        <li>📄 支持上传PDF/Word政策文件</li>
        <li>💬 多轮对话，持续深入交流</li>
        <li>⚡ 基于最新政策库，实时解答</li>
      </ul>
    </div>
  </main>

  <button class="floating-btn" id="floatingBtn" title="打开政策助手" aria-label="打开政策助手">
    <span class="floating-icon">?</span>
  </button>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-title">
        <span class="chat-header-icon">🌾</span>
        <span>政策助手</span>
      </div>
      <button class="chat-close-btn" id="chatCloseBtn" title="关闭" aria-label="关闭">&times;</button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        <div class="avatar">🌾</div>
        <div class="bubble">
          <p>您好！我是高标准农田AI政策助手。您可以向我咨询高标准农田建设的相关政策，也可以上传PDF或Word文件，我将基于文件内容为您解答。请问有什么可以帮您的？</p>
        </div>
      </div>
    </div>

    <div class="file-tags" id="fileTags" style="display: none;">
    </div>

    <div class="chat-input-area">
      <input type="file" id="fileInput" accept=".pdf,.doc,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword" multiple hidden />
      <button class="attach-btn" id="attachBtn" title="上传文件" aria-label="上传文件">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="text" class="chat-input" id="chatInput" placeholder="输入您的问题..." autocomplete="off" />
      <button class="send-btn" id="sendBtn" title="发送" aria-label="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    window.ENV = {
      DIFY_API_BASE: 'https://api.dify.ai/v1',
      DIFY_API_KEY: 'app-xxxxxxxxxxxxxxxxxxxx'
    };
  </script>

  <script src="app.js"></script>
</body>
</html>
