<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>高标准农田AI政策助手</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>/* ========== CSS Variables ========== */
:root {
  --green-50: #f0fdf4;
  --green-100: #dcfce7;
  --green-200: #bbf7d0;
  --green-400: #4ade80;
  --green-500: #22c55e;
  --green-600: #16a34a;
  --green-700: #15803d;
  --green-800: #166534;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --red-100: #fee2e2;
  --red-400: #f87171;
  --red-500: #ef4444;
  --red-600: #dc2626;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
  --transition: 0.25s ease;
}

/* ========== Reset ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, var(--green-50) 0%, #f0fff0 50%, var(--green-100) 100%);
  min-height: 100vh;
  color: var(--gray-800);
  line-height: 1.6;
}

/* ========== Page Header ========== */
.page-header {
  text-align: center;
  padding: 48px 20px 32px;
}
.header-content {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.header-icon { font-size: 40px; }
.header-title {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--green-600), var(--green-700));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-subtitle {
  margin-top: 8px;
  color: var(--gray-500);
  font-size: 15px;
}

/* ========== Hero Section ========== */
.main-content { max-width: 520px; margin: 0 auto; padding: 0 20px 80px; }
.hero-section { text-align: center; }
.hero-icon { font-size: 64px; margin-bottom: 16px; }
.hero-section h2 { font-size: 22px; color: var(--gray-700); margin-bottom: 8px; }
.hero-section > p { color: var(--gray-500); margin-bottom: 24px; }
.feature-list { list-style: none; text-align: left; max-width: 320px; margin: 0 auto; }
.feature-list li { padding: 6px 0; color: var(--gray-600); font-size: 15px; }

/* ========== Floating Button ========== */
.floating-btn {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 60px;
  height: 60px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-500), var(--green-600));
  box-shadow: 0 4px 16px rgba(22, 163, 74, 0.4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: transform var(--transition), box-shadow var(--transition);
  animation: breathe 2.5s ease-in-out infinite;
}
.floating-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 24px rgba(22, 163, 74, 0.55);
}
.floating-btn.panel-open { animation: none; transform: scale(0); opacity: 0; pointer-events: none; }
.floating-icon {
  color: white;
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 4px 16px rgba(22, 163, 74, 0.4); }
  50% { box-shadow: 0 4px 28px rgba(22, 163, 74, 0.65); }
}

/* ========== Chat Panel ========== */
.chat-panel {
  position: fixed;
  bottom: 100px;
  right: 28px;
  width: 380px;
  height: 550px;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transform: translateY(16px) scale(0.95);
  transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
  overflow: hidden;
}
.chat-panel.open {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
}
.chat-panel.closing {
  opacity: 0;
  visibility: visible;
  transform: translateY(16px) scale(0.95);
}

/* Chat Header (draggable) */
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: linear-gradient(135deg, var(--green-600), var(--green-700));
  color: white;
  cursor: grab;
  user-select: none;
  flex-shrink: 0;
}
.chat-header:active { cursor: grabbing; }
.chat-header-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
.chat-header-icon { font-size: 20px; }
.chat-close-btn {
  background: none;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background 0.2s;
}
.chat-close-btn:hover { background: rgba(255,255,255,0.2); }

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: var(--gray-50);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 10px; }

.message { display: flex; gap: 8px; }
.message.user { flex-direction: row-reverse; }
.message .avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--green-100);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.message.user .avatar { background: var(--green-200); }
.message .bubble {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
}
.message.assistant .bubble {
  background: white;
  border: 1px solid var(--gray-200);
  border-top-left-radius: 4px;
}
.message.user .bubble {
  background: var(--green-600);
  color: white;
  border-top-right-radius: 4px;
}

/* Markdown inside bubble */
.message.assistant .bubble p { margin-bottom: 6px; }
.message.assistant .bubble p:last-child { margin-bottom: 0; }
.message.assistant .bubble strong { color: var(--gray-800); }
.message.assistant .bubble a { color: var(--green-600); }
.message.assistant .bubble code {
  background: var(--gray-100);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 13px;
}
.message.assistant .bubble pre {
  background: var(--gray-800);
  color: var(--green-100);
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
  margin: 6px 0;
}
.message.assistant .bubble ul, .message.assistant .bubble ol { padding-left: 18px; margin: 4px 0; }

/* Error bubble */
.message.assistant .bubble.error-bubble {
  background: var(--red-100);
  border-color: #fecaca;
  color: var(--red-600);
}

/* File Tags */
.file-tags {
  padding: 0 16px 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: var(--gray-50);
}
.file-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: var(--green-100);
  border: 1px solid var(--green-200);
  border-radius: 20px;
  font-size: 12px;
  color: var(--green-700);
  max-width: 160px;
  overflow: hidden;
}
.file-tag-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-tag-remove {
  background: none;
  border: none;
  color: var(--green-600);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
}
.file-tag-remove:hover { color: var(--red-500); }

/* Input Area */
.chat-input-area {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-top: 1px solid var(--gray-200);
  background: white;
  flex-shrink: 0;
}
.attach-btn, .send-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  color: var(--gray-500);
  transition: color 0.2s, background 0.2s;
  display: flex;
  align-items: center;
}
.attach-btn:hover { color: var(--green-600); background: var(--green-50); }
.send-btn {
  background: var(--green-600);
  color: white;
  width: 36px;
  height: 36px;
  justify-content: center;
  border-radius: 50%;
}
.send-btn:hover { background: var(--green-700); }
.send-btn:disabled { background: var(--gray-400); cursor: not-allowed; }
.chat-input {
  flex: 1;
  border: 1px solid var(--gray-200);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--green-400); }

/* Loading */
.typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
.typing-indicator span {
  width: 8px;
  height: 8px;
  background: var(--gray-400);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ========== Responsive ========== */
@media (max-width: 480px) {
  .chat-panel {
    width: calc(100vw - 20px);
    right: 10px;
    bottom: 80px;
    height: 520px;
  }
  .floating-btn { bottom: 16px; right: 16px; width: 52px; height: 52px; }
  .header-title { font-size: 22px; }
}

</style>
</head>
<body>

<header class="page-header">
  <div class="header-content"><span class="header-icon">🌾</span>
  <h1 class="header-title">高标准农田AI政策助手</h1></div>
  <p class="header-subtitle">基于最新政策文件，为您提供专业、准确的农田建设政策咨询</p>
</header>

<main class="main-content">
  <div class="hero-section">
    <div class="hero-icon">🌱</div>
    <h2>欢迎使用政策助手</h2>
    <p>点击右下角悬浮球，开始您的政策咨询之旅</p>
    <ul class="feature-list">
      <li>🔍 高标准农田政策智能问答</li><li>📄 支持上传PDF/Word政策文件</li>
      <li>💬 多轮对话，持续深入交流</li><li>⚡ 基于最新政策库，实时解答</li>
    </ul>
  </div>
</main>

<button class="floating-btn" id="floatingBtn"><span class="floating-icon">?</span></button>

<div class="chat-panel" id="chatPanel">
  <div class="chat-header" id="chatHeader">
    <div class="chat-header-title"><span>🌾</span><span>政策助手</span></div>
    <button class="chat-close-btn" id="chatCloseBtn">&times;</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="message assistant">
      <div class="avatar">🌾</div>
      <div class="bubble"><p>您好！我是高标准农田AI政策助手。您可以向我咨询高标准农田建设的相关政策，也可以上传PDF或Word文件，我将基于文件内容为您解答。请问有什么可以帮您的？</p></div>
    </div>
  </div>
  <div class="file-tags" id="fileTags" style="display:none;"></div>
  <div class="chat-input-area">
    <input type="file" id="fileInput" accept=".pdf,.doc,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword" multiple hidden />
    <button class="attach-btn" id="attachBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
    <input type="text" class="chat-input" id="chatInput" placeholder="输入您的问题..." autocomplete="off" />
    <button class="send-btn" id="sendBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </div>
</div>

<script>
window.ENV = {
  DIFY_API_BASE: 'https://api.dify.ai/v1',
  DIFY_API_KEY: 'app-YzQjquRlPhPeFWCD1QHSfn0c'
};
</script>
<script>/**
 * 高标准农田AI政策助手 - 前端交互逻辑
 * 功能：悬浮球、聊天窗口、文件上传、Dify API 调用
 */

(function () {
  'use strict';

  // ==================== 配置 ====================
  const API_BASE = (window.ENV && window.ENV.DIFY_API_BASE) || 'https://api.dify.ai/v1';
  const API_KEY = (window.ENV && window.ENV.DIFY_API_KEY) || 'app-xxxxxxxxxxxxxxxxxxxx';
  const USER_ID = 'farm-policy-user-' + Date.now();

  // ==================== DOM 元素 ====================
  const floatingBtn = document.getElementById('floatingBtn');
  const chatPanel = document.getElementById('chatPanel');
  const chatHeader = document.getElementById('chatHeader');
  const chatCloseBtn = document.getElementById('chatCloseBtn');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const fileTags = document.getElementById('fileTags');

  // ==================== 状态 ====================
  let isPanelOpen = false;
  let conversationId = '';        // 多轮对话 ID
  let pendingFiles = [];          // 待发送的文件对象 { name, id, file }
  let isSending = false;          // 防止重复发送

  // ==================== 悬浮球 & 面板开关 ====================
  floatingBtn.addEventListener('click', function () {
    if (isPanelOpen) return;
    openPanel();
  });

  chatCloseBtn.addEventListener('click', function () {
    closePanel();
  });

  function openPanel() {
    isPanelOpen = true;
    floatingBtn.classList.add('panel-open');
    chatPanel.classList.add('open');
    chatPanel.classList.remove('closing');
    chatInput.focus();
  }

  function closePanel() {
    isPanelOpen = false;
    chatPanel.classList.add('closing');
    chatPanel.classList.remove('open');
    // 等动画结束再隐藏悬浮球动画状态
    setTimeout(function () {
      chatPanel.classList.remove('closing');
      floatingBtn.classList.remove('panel-open');
    }, 300);
  }

  // ==================== 面板拖拽 ====================
  let isDragging = false;
  let dragStartX, dragStartY, panelStartX, panelStartY;

  chatHeader.addEventListener('mousedown', function (e) {
    if (e.target === chatCloseBtn || chatCloseBtn.contains(e.target)) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    var rect = chatPanel.getBoundingClientRect();
    panelStartX = rect.left;
    panelStartY = rect.top;
    chatPanel.style.transition = 'none';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;
    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;
    chatPanel.style.left = (panelStartX + dx) + 'px';
    chatPanel.style.top = (panelStartY + dy) + 'px';
    chatPanel.style.right = 'auto';
    chatPanel.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', function () {
    if (isDragging) {
      isDragging = false;
      chatPanel.style.transition = '';
      document.body.style.userSelect = '';
    }
  });

  // ==================== 文件上传 ====================
  attachBtn.addEventListener('click', function () {
    fileInput.click();
  });

  fileInput.addEventListener('change', function () {
    var files = fileInput.files;
    for (var i = 0; i < files.length; i++) {
      addFileTag(files[i]);
    }
    fileInput.value = '';
  });

  function addFileTag(file) {
    // 检查是否已存在
    for (var i = 0; i < pendingFiles.length; i++) {
      if (pendingFiles[i].file.name === file.name && pendingFiles[i].file.size === file.size) {
        return;
      }
    }
    pendingFiles.push({ name: file.name, id: null, file: file });
    renderFileTags();
  }

  function removeFileTag(index) {
    pendingFiles.splice(index, 1);
    renderFileTags();
  }

  function renderFileTags() {
    fileTags.innerHTML = '';
    if (pendingFiles.length === 0) {
      fileTags.style.display = 'none';
      return;
    }
    fileTags.style.display = 'flex';
    pendingFiles.forEach(function (item, index) {
      var tag = document.createElement('span');
      tag.className = 'file-tag';
      tag.innerHTML =
        '<span class="file-tag-name" title="' + escapeHtml(item.name) + '">📎 ' + escapeHtml(item.name) + '</span>' +
        '<button class="file-tag-remove" data-index="' + index + '" title="移除">&times;</button>';
      tag.querySelector('.file-tag-remove').addEventListener('click', function () {
        removeFileTag(parseInt(this.getAttribute('data-index'), 10));
      });
      fileTags.appendChild(tag);
    });
  }

  // ==================== 消息渲染 ====================
  function addMessage(role, content, isError) {
    var msgDiv = document.createElement('div');
    msgDiv.className = 'message ' + role;
    var avatarEmoji = role === 'user' ? '👤' : '🌾';
    msgDiv.innerHTML = '<div class="avatar">' + avatarEmoji + '</div>' +
      '<div class="bubble' + (isError ? ' error-bubble' : '') + '">' +
      (role === 'assistant' ? renderMarkdown(content) : '<p>' + escapeHtml(content) + '</p>') +
      '</div>';
    chatMessages.appendChild(msgDiv);
    scrollToBottom();
    return msgDiv;
  }

  function addLoadingMessage() {
    var msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';
    msgDiv.id = 'loadingMessage';
    msgDiv.innerHTML = '<div class="avatar">🌾</div>' +
      '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div><p style="color:var(--gray-500);font-size:13px;">正在查询政策...</p></div>';
    chatMessages.appendChild(msgDiv);
    scrollToBottom();
    return msgDiv;
  }

  function removeLoadingMessage() {
    var el = document.getElementById('loadingMessage');
    if (el) el.remove();
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function renderMarkdown(text) {
    try {
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(text);
      }
    } catch (e) { /* fallback */ }
    return '<p>' + escapeHtml(text).replace(/\n/g, '<br>') + '</p>';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ==================== Dify API 调用 ====================

  /**
   * 步骤1: 上传文件到 Dify，获取 upload_file_id
   */
  async function uploadFileToDify(file) {
    var formData = new FormData();
    formData.append('file', file);
    formData.append('user', USER_ID);

    var response = await fetch(API_BASE + '/files/upload', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + API_KEY },
      body: formData
    });

    if (!response.ok) {
      var errText = await response.text().catch(function () { return 'Unknown error'; });
      throw new Error('文件上传失败 (' + response.status + '): ' + errText);
    }

    var data = await response.json();
    return data.id; // upload_file_id
  }

  /**
   * 步骤2: 发送对话消息
   */
  async function sendChatMessage(query, fileIds) {
    var body = {
      inputs: {},
      query: query,
      user: USER_ID,
      response_mode: 'blocking'
    };

    if (conversationId) {
      body.conversation_id = conversationId;
    }

    if (fileIds && fileIds.length > 0) {
      body.files = fileIds.map(function (id) {
        return { type: 'document', transfer_method: 'local_file', upload_file_id: id };
      });
    }

    var response = await fetch(API_BASE + '/chat-messages', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      var errText = await response.text().catch(function () { return 'Unknown error'; });
      throw new Error('请求失败 (' + response.status + '): ' + errText);
    }

    return await response.json();
  }

  // ==================== 发送消息主流程 ====================
  async function handleSend() {
    var query = chatInput.value.trim();
    if (!query && pendingFiles.length === 0) return;
    if (isSending) return;

    // 如果没有文本但有文件，补充默认提示
    if (!query) {
      query = '请基于上传的文件内容进行总结和分析';
    }

    isSending = true;
    sendBtn.disabled = true;
    chatInput.disabled = true;

    // 显示用户消息
    var displayQuery = query;
    if (pendingFiles.length > 0) {
      displayQuery = query + '\n\n📎 已附加 ' + pendingFiles.length + ' 个文件';
    }
    addMessage('user', displayQuery);

    // 显示加载状态
    addLoadingMessage();

    // 保存当前文件列表（上传完成后清空）
    var filesToUpload = pendingFiles.slice();
    pendingFiles = [];
    renderFileTags();
    chatInput.value = '';

    try {
      // 步骤1: 上传所有文件
      var fileIds = [];
      for (var i = 0; i < filesToUpload.length; i++) {
        var fid = await uploadFileToDify(filesToUpload[i].file);
        fileIds.push(fid);
      }

      // 步骤2: 发送对话
      var result = await sendChatMessage(query, fileIds);

      removeLoadingMessage();

      // 保存 conversation_id 用于多轮对话
      if (result.conversation_id) {
        conversationId = result.conversation_id;
      }

      // 显示 AI 回复
      var answer = result.answer || '（未获取到回复内容）';
      addMessage('assistant', answer, false);

    } catch (error) {
      removeLoadingMessage();
      console.error('API Error:', error);
      addMessage('assistant', '服务暂时不可用，请稍后重试', true);
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
    }
  }

  // ==================== 事件绑定 ====================
  sendBtn.addEventListener('click', handleSend);

  chatInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // ==================== 初始键盘快捷键 ====================
  document.addEventListener('keydown', function (e) {
    // Ctrl/Cmd + K 快速打开/关闭面板
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      if (isPanelOpen) {
        closePanel();
      } else {
        openPanel();
      }
    }
  });

})();

</script>
</body>
</html>
